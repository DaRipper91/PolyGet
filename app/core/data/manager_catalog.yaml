- id: dnf
  name: DNF
  category: System
  description: Fedora/RHEL system package manager.
  icon: package-x-generic
  binary: dnf
  has_driver: true
  self_install: {}

- id: pacman
  name: Pacman
  category: System
  description: Arch Linux system package manager.
  icon: package-x-generic
  binary: pacman
  has_driver: false
  self_install: {}

- id: paru
  name: Paru (AUR helper)
  category: System
  description: AUR helper for Arch-based systems, wraps pacman for community packages.
  icon: package-x-generic
  binary: paru
  has_driver: false
  self_install:
    arch: ["sudo", "pacman", "-S", "--noconfirm", "paru"]

- id: flatpak
  name: Flatpak
  category: Universal
  description: Sandboxed, distro-agnostic universal app packages.
  icon: emblem-downloads
  binary: flatpak
  has_driver: true
  self_install:
    fedora: ["pkexec", "dnf", "install", "-y", "flatpak"]
    arch: ["sudo", "pacman", "-S", "--noconfirm", "flatpak"]
    debian: ["pkexec", "apt-get", "install", "-y", "flatpak"]
    suse: ["pkexec", "zypper", "install", "-y", "flatpak"]

- id: npm
  name: NPM
  category: Language/Dev
  description: Node.js package manager for globally installed JS tooling.
  icon: text-x-script
  binary: npm
  has_driver: true
  self_install:
    fedora: ["pkexec", "dnf", "install", "-y", "nodejs"]
    arch: ["sudo", "pacman", "-S", "--noconfirm", "nodejs", "npm"]
    debian: ["pkexec", "apt-get", "install", "-y", "nodejs", "npm"]

- id: pipx
  name: Pipx
  category: Language/Dev
  description: Installs and runs Python CLI applications in isolated environments.
  icon: text-x-python
  binary: pipx
  has_driver: true
  self_install:
    fedora: ["pkexec", "dnf", "install", "-y", "pipx"]
    arch: ["sudo", "pacman", "-S", "--noconfirm", "python-pipx"]
    debian: ["pkexec", "apt-get", "install", "-y", "pipx"]

- id: cargo
  name: Cargo
  category: Language/Dev
  description: Rust toolchain's package manager, for globally installed Rust binaries.
  icon: text-x-generic
  binary: cargo
  has_driver: true
  self_install:
    fedora: ["pkexec", "dnf", "install", "-y", "cargo"]
    arch: ["sudo", "pacman", "-S", "--noconfirm", "rust"]
    debian: ["pkexec", "apt-get", "install", "-y", "cargo"]

- id: apt
  name: APT
  category: System
