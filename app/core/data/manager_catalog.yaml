- id: dnf
  name: DNF
  category: System
  description: Fedora/RHEL system package manager.
  icon: package-x-generic
  binary: dnf
  has_driver: true
  self_install: {}

- id: pacman
  name: Pacman
  category: System
  description: Arch Linux system package manager.
  icon: package-x-generic
  binary: pacman
  has_driver: true

- id: paru
  name: Paru (AUR helper)
  category: System
  description: AUR helper for Arch-based systems, wraps pacman for community packages.
  icon: package-x-generic
  binary: paru
  has_driver: false
  self_install:
    arch: ["sudo", "pacman", "-S", "--noconfirm", "paru"]

- id: flatpak
  name: Flatpak
  category: Universal
  description: Sandboxed, distro-agnostic universal app packages.
  icon: emblem-downloads
  binary: flatpak
  has_driver: true
  self_install:
    fedora: ["pkexec", "dnf", "install", "-y", "flatpak"]
    arch: ["sudo", "pacman", "-S", "--noconfirm", "flatpak"]
    debian: ["pkexec", "apt-get", "install", "-y", "flatpak"]
    suse: ["pkexec", "zypper", "install", "-y", "flatpak"]

